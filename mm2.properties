# MirrorMaker 2 Configuration
# Replicates commit-log from Primary cluster → DR cluster

clusters = primary, dr

primary.bootstrap.servers = kafka-primary:9092
dr.bootstrap.servers = kafka-dr:9093

# Enable replication from primary to dr
primary->dr.enabled = true

# Replicate the commit-log topic (Task requirement: commit-log → primary.commit-log)
primary->dr.topics = .*

# Replication factor = 1 for single-node clusters
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

sync.topic.acls.enabled = false
sync.topic.configs.enabled = false

# Heartbeat interval for liveness checks
emit.heartbeats.interval.seconds = 5

# Refresh interval for topic list
refresh.topics.interval.seconds = 10

# Offset flush and sync settings for reliability in tests
offset.flush.interval.ms = 1000
primary->dr.emit.checkpoints.interval.seconds = 1
primary->dr.emit.offset-syncs.interval.seconds = 1

# Consumer settings for the MirrorSourceTask
consumer.auto.offset.reset = none